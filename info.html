<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የሚያስፈልጉ መረጃዎች ዝርዝር</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, sans-serif;
            box-sizing: border-box;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #ffd700;
            backdrop-filter: blur(5px);
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 1.05rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li:last-child {
            border-bottom: none;
        }
        .en {
            color: #ffd700;
            font-weight: bold;
        }
        .am {
            color: #ddd;
        }
    </style>
</head>
<body>

<div class="info-card">
    <h2>📋 Required Information / የሚያስፈልጉ መረጃዎች</h2>
    
    <ul>
        <li>
            <span class="en">1. Full Name</span>
            <span class="am">(ስም እስከነ አያት)</span>
        </li>
        <li>
            <span class="en">2. Phone Number</span>
            <span class="am">(ስልክ ቁጥር)</span>
        </li>
        <li>
            <span class="en">3. Place of Birth</span>
            <span class="am">(የትውልድ ቦታ)</span>
        </li>
        <li>
            <span class="en">4. Fayda ID Number</span>
            <span class="am">(የፋይዳ ቁጥር)</span>
        </li>
        <li>
            <span class="en">5. Bank Account Number</span>
            <span class="am">(ገንዘብ መቀበያ አካውንት)</span>
        </li>
        <li>
            <span class="en">6. Registration Fee Payment Status</span>
            <span class="am">(የመመዝገቢያ ክፍያ ሁኔታ)</span>
        </li>
    </ul>
</div>

</body>
</html>
